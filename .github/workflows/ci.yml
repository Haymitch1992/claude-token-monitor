name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (${{ matrix.os }}, node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm test

  smoke:
    name: smoke (CLI launches)
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Start server and probe endpoints
        run: |
          node ./bin/cli.js start --no-open --port 17878 &
          PID=$!
          sleep 2
          curl -fsS http://127.0.0.1:17878/api/status > /dev/null
          curl -fsS http://127.0.0.1:17878/api/usage > /dev/null
          curl -fsS http://127.0.0.1:17878/ > /dev/null
          kill $PID
